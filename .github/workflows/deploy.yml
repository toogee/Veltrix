name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Déclenche le déploiement sur les branches main et master

# Autorisations requises pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permet d'éviter d'avoir plusieurs déploiements concurrents en attente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload des fichiers statiques de Veltrix
        uses: actions/upload-pages-artifact@v3
        with:
          # Télécharge tout le répertoire racine (contenant vos pages Veltrix)
          path: '.'

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
